<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Trauma Team Board</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0f14">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root{
    --bg:#e9eef2;
    --panel:#ffffff;
    --panel-2:#f2f5f8;
    --border:#c9d4dc;
    --text:#152230;
    --muted:#5b6b78;
    --teal:#0d8f6c;
    --teal-dim:#dbf5ec;
    --amber:#b06a05;
    --amber-dim:#fdecd0;
    --slate:#e4e9ed;
    --slate-text:#5b6b78;
    --danger:#c0392b;
    --danger-dim:#fbe1de;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, "Roboto Mono", monospace;
    --sans: -apple-system, "Segoe UI", "Helvetica Neue", Arial, system-ui, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; height:100%; background:var(--bg); color:var(--text);
    font-family:var(--sans); overflow:hidden;
  }
  #app{
    height:100vh; display:flex; flex-direction:column; padding:14px 20px 10px;
    gap:10px;
  }

  /* HEADER */
  header{
    display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
    background:var(--panel); border:1px solid var(--border); border-radius:14px;
    padding:10px 22px;
  }
  .clock{
    font-family:var(--mono); font-size:clamp(22px,2.6vw,40px); font-weight:600;
    letter-spacing:1px; justify-self:start;
  }
  .clock .date{
    display:block; font-family:var(--sans); font-size:12px; color:var(--muted);
    font-weight:400; letter-spacing:.5px; margin-top:2px;
  }
  h1{
    margin:0; font-size:clamp(18px,2vw,28px); letter-spacing:3px; font-weight:800;
    text-align:center; color:var(--text);
  }
  .timer-block{ justify-self:end; display:flex; align-items:center; gap:14px; }
  .timer-readout{
    font-family:var(--mono); font-size:clamp(22px,2.6vw,40px); font-weight:700;
    color:var(--teal); min-width:5.2ch; text-align:right;
  }
  .timer-readout.running{ animation: soft-glow 2s ease-in-out infinite; }
  @keyframes soft-glow{
    0%,100%{ text-shadow:0 0 0px rgba(51,201,160,0); }
    50%{ text-shadow:0 0 14px rgba(51,201,160,.55); }
  }
  .btn{
    font-family:var(--sans); font-size:13px; font-weight:600; letter-spacing:.3px;
    border-radius:9px; border:1px solid var(--border); background:var(--panel-2);
    color:var(--text); padding:9px 14px; cursor:pointer; transition:.15s;
  }
  .btn:hover{ background:#e2e8ec; }
  .btn.primary{ background:var(--teal-dim); border-color:var(--teal); color:#065a41; }
  .btn.primary:hover{ background:#c8eee0; }
  .btn.warn{ background:var(--amber-dim); border-color:var(--amber); color:#7a4600; }
  .btn.warn:hover{ background:#fbe0b0; }
  .btn.danger{ background:var(--danger-dim); border-color:var(--danger); color:#8a271b; }
  .btn.danger:hover{ background:#f7cdc8; }
  .btn:disabled{ opacity:.35; cursor:not-allowed; }
  .icon-btn{
    border:1px solid var(--border); background:var(--panel-2); color:var(--muted);
    border-radius:9px; padding:8px 10px; cursor:pointer; font-size:14px;
  }

  /* ABCDE BAR */
  .abcde{
    display:grid; grid-template-columns:repeat(5,1fr); gap:10px;
  }
  .letter-tile{
    background:var(--panel); border:1px solid var(--border); border-radius:14px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:10px 6px; cursor:pointer; user-select:none; transition:.15s;
    min-height:88px;
  }
  .letter-tile .letter{
    font-size:clamp(26px,3vw,40px); font-weight:800; line-height:1;
  }
  .letter-tile .status{
    font-size:11px; letter-spacing:1px; text-transform:uppercase; margin-top:4px;
    color:var(--muted); font-weight:600;
  }
  .letter-tile .subtimer{
    font-family:var(--mono); font-size:15px; margin-top:5px; color:var(--muted);
  }
  .letter-tile.pending{ background:var(--panel); }
  .letter-tile.pending .letter{ color:var(--slate-text); }
  .letter-tile.inprogress{
    background:linear-gradient(180deg, var(--amber-dim), var(--panel));
    border-color:var(--amber); animation:pulse-amber 1.8s ease-in-out infinite;
  }
  .letter-tile.inprogress .letter, .letter-tile.inprogress .subtimer{ color:var(--amber); }
  .letter-tile.inprogress .status{ color:var(--amber); }
  .letter-tile.resolved{
    background:linear-gradient(180deg, var(--teal-dim), var(--panel)); border-color:var(--teal);
  }
  .letter-tile.resolved .letter, .letter-tile.resolved .subtimer{ color:var(--teal); }
  .letter-tile.resolved .status{ color:var(--teal); }
  @keyframes pulse-amber{
    0%,100%{ box-shadow:0 0 0 0 rgba(232,163,61,0); }
    50%{ box-shadow:0 0 0 6px rgba(232,163,61,.12); }
  }

  /* MAIN BOARD */
  main{
    flex:1; background:var(--panel); border:1px solid var(--border); border-radius:14px;
    position:relative; padding:18px 26px; display:grid;
    grid-template-columns:1fr 1fr 1fr;
    grid-template-rows:auto auto auto auto;
    gap:10px 18px;
    min-height:0;
  }
  .role{ display:flex; align-items:center; gap:10px; }
  .role label{
    font-size:clamp(13px,1.1vw,16px); color:var(--muted); white-space:nowrap; min-width:100px;
  }
  .role input{
    flex:1; background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    border-radius:8px; padding:8px 10px; font-size:clamp(13px,1.1vw,16px); font-family:var(--sans);
    min-width:0;
  }
  .role input:focus{ outline:2px solid var(--teal); outline-offset:1px; }
  .role.reverse{ flex-direction:row-reverse; }
  .role.reverse label{ text-align:left; }

  .col-a{ grid-column:1; }
  .col-b{ grid-column:2; }
  .col-c{ grid-column:3; }

  .center-visual{
    grid-column:2; grid-row:1 / span 3; align-self:center; justify-self:center;
    width:min(190px,15vw); aspect-ratio:1/1; border-radius:50%;
    background:var(--panel-2);
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
    padding:10px; border:1px solid var(--border); box-shadow:0 2px 10px rgba(21,34,48,.06);
  }
  .center-visual svg{ width:62%; height:auto; }
  .center-visual span{
    display:block; margin-top:6px; font-size:11px; letter-spacing:.5px;
    color:var(--muted); text-transform:uppercase; font-weight:600;
  }

  footer{ display:flex; justify-content:center; }

  #toast{
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    background:var(--panel-2); border:1px solid var(--border); padding:8px 16px;
    border-radius:20px; font-size:13px; color:var(--muted); opacity:0; pointer-events:none;
    transition:opacity .3s;
  }
  #toast.show{ opacity:1; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="clock" id="clock">--:--:--<span class="date" id="dateStr"></span></div>
    <h1>TRAUMA TEAM</h1>
    <div class="timer-block">
      <div>
        <div class="timer-readout" id="genTimer">00:00</div>
      </div>
      <button class="btn primary" id="genStart">Iniciar</button>
      <button class="btn warn" id="genPause" disabled>Pausar</button>
      <button class="icon-btn" id="genReset" title="Reiniciar cronómetro">⟲</button>
      <button class="icon-btn" id="fsBtn" title="Pantalla completa">⛶</button>
    </div>
  </header>

  <div class="abcde" id="abcde"></div>

  <main>
    <div class="role col-a" style="grid-row:1;"><label>Metge A</label><input data-key="metgeA"></div>
    <div class="role col-a" style="grid-row:2;"><label>Enfermera A</label><input data-key="enfermeraA"></div>

    <div class="role col-a" style="grid-row:3;"><label>Metge B</label><input data-key="metgeB"></div>
    <div class="role col-a" style="grid-row:4;"><label>Enfermera B</label><input data-key="enfermeraB"></div>

    <div class="center-visual">
      <svg viewBox="0 0 100 190" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="18" r="16" fill="var(--teal)"/>
        <path d="
          M 39,36
          L 12,52 L 22,64 L 40,50
          L 40,78
          L 16,188 L 36,188 L 50,110
          L 50,110
          L 64,188 L 84,188 L 60,78
          L 60,50 L 78,64 L 88,52 L 61,36
          Z"
          fill="var(--teal)"/>
      </svg>
      <span>Imagen de paciente<br>didáctica</span>
    </div>

    <div class="role col-c" style="grid-row:1;"><label>Metge C</label><input data-key="metgeC"></div>
    <div class="role col-c reverse" style="grid-row:2;"><label>Traumatología</label><input data-key="traumatologia"></div>
    <div class="role col-c reverse" style="grid-row:3;"><label>Radiología</label><input data-key="radiologia"></div>
    <div class="role col-c reverse" style="grid-row:4;"><label>T. Radiología</label><input data-key="tRadiologia"></div>

    <div class="role col-a" style="grid-row:5;"><label>Metge support</label><input data-key="metgeSupport"></div>
    <div class="role col-b" style="grid-row:5;"><label>Metge Líder</label><input data-key="metgeLider"></div>

    <div class="role col-a" style="grid-row:6;"><label>TCAI</label><input data-key="tcai"></div>
    <div class="role col-a" style="grid-row:7;"><label>Zelador</label><input data-key="zelador"></div>
  </main>

  <footer>
    <button class="btn danger" id="newCase">Nuevo caso (reset completo)</button>
  </footer>
</div>

<div id="toast"></div>

<script>
const STORAGE_KEY = "trauma-team-state-v1";
const LETTERS = ["A","B","C","D","E"];
const STATE_CYCLE = ["pending","inprogress","resolved"];

function defaultState(){
  return {
    roles: {},
    general: { running:false, startedAt:null, accumulated:0 },
    abcde: Object.fromEntries(LETTERS.map(l => [l, { state:"pending", startedAt:null, accumulated:0 }]))
  };
}

let state = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return { ...defaultState(), ...parsed, general:{...defaultState().general, ...parsed.general}, abcde:{...defaultState().abcde, ...parsed.abcde} };
  }catch(e){ return defaultState(); }
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

/* ---------- Reloj ---------- */
function tickClock(){
  const now = new Date();
  document.getElementById("clock").firstChild.textContent =
    now.toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById("dateStr").textContent =
    now.toLocaleDateString('es-ES', {weekday:'long', day:'2-digit', month:'long'});
}

/* ---------- Formato tiempo ---------- */
function fmt(ms){
  const totalSec = Math.floor(ms/1000);
  const h = Math.floor(totalSec/3600);
  const m = Math.floor((totalSec%3600)/60);
  const s = totalSec%60;
  const pad = n => String(n).padStart(2,'0');
  return h>0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}
function elapsedOf(t){
  return t.accumulated + (t.running ? (Date.now() - t.startedAt) : 0);
}

/* ---------- Cronómetro general ---------- */
const genTimerEl = document.getElementById("genTimer");
const genStartBtn = document.getElementById("genStart");
const genPauseBtn = document.getElementById("genPause");
const genResetBtn = document.getElementById("genReset");

function renderGeneral(){
  genTimerEl.textContent = fmt(elapsedOf(state.general));
  genTimerEl.classList.toggle("running", state.general.running);
  genStartBtn.disabled = state.general.running;
  genPauseBtn.disabled = !state.general.running;
}
genStartBtn.onclick = () => {
  if(state.general.running) return;
  state.general.running = true;
  state.general.startedAt = Date.now();
  saveState(); renderGeneral();
};
genPauseBtn.onclick = () => {
  if(!state.general.running) return;
  state.general.accumulated += Date.now() - state.general.startedAt;
  state.general.running = false;
  state.general.startedAt = null;
  saveState(); renderGeneral();
};
genResetBtn.onclick = () => {
  if(!confirm("¿Reiniciar el cronómetro general?")) return;
  state.general = defaultState().general;
  saveState(); renderGeneral();
};

/* ---------- ABCDE ---------- */
const abcdeEl = document.getElementById("abcde");
const STATUS_LABEL = { pending:"Pendiente", inprogress:"En curso", resolved:"Resuelto" };

function buildAbcde(){
  abcdeEl.innerHTML = "";
  LETTERS.forEach(letter => {
    const tile = document.createElement("div");
    tile.className = "letter-tile";
    tile.dataset.letter = letter;
    tile.innerHTML = `
      <div class="letter">${letter}</div>
      <div class="status"></div>
      <div class="subtimer"></div>
    `;
    tile.onclick = () => cycleLetter(letter);
    abcdeEl.appendChild(tile);
  });
}

function cycleLetter(letter){
  const t = state.abcde[letter];
  const idx = STATE_CYCLE.indexOf(t.state);
  const next = STATE_CYCLE[(idx+1) % STATE_CYCLE.length];

  if(next === "inprogress"){
    t.startedAt = Date.now();
  } else if(next === "resolved"){
    if(t.startedAt){ t.accumulated += Date.now() - t.startedAt; }
    t.startedAt = null;
  } else if(next === "pending"){
    t.accumulated = 0; t.startedAt = null;
  }
  t.state = next;
  saveState();
  renderAbcde();
}

function renderAbcde(){
  LETTERS.forEach(letter => {
    const t = state.abcde[letter];
    const tile = abcdeEl.querySelector(`[data-letter="${letter}"]`);
    if(!tile) return;
    tile.className = `letter-tile ${t.state}`;
    tile.querySelector(".status").textContent = STATUS_LABEL[t.state];
    const running = t.state === "inprogress";
    const elapsed = t.accumulated + (running ? Date.now() - t.startedAt : 0);
    tile.querySelector(".subtimer").textContent = t.state === "pending" ? "--:--" : fmt(elapsed);
  });
}

/* ---------- Roles (inputs) ---------- */
document.querySelectorAll(".role input").forEach(input => {
  const key = input.dataset.key;
  input.value = state.roles[key] || "";
  input.addEventListener("input", () => {
    state.roles[key] = input.value;
    saveState();
  });
});

/* ---------- Nuevo caso ---------- */
document.getElementById("newCase").onclick = () => {
  if(!confirm("Esto borrará nombres, cronómetro y estado ABCDE para empezar un caso nuevo. ¿Continuar?")) return;
  state = defaultState();
  saveState();
  document.querySelectorAll(".role input").forEach(input => input.value = "");
  renderGeneral();
  renderAbcde();
  showToast("Pizarra reiniciada para nuevo caso");
};

/* ---------- Pantalla completa ---------- */
document.getElementById("fsBtn").onclick = () => {
  if(!document.fullscreenElement){ document.documentElement.requestFullscreen().catch(()=>{}); }
  else{ document.exitFullscreen(); }
};

/* ---------- Toast ---------- */
let toastTimeout;
function showToast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(()=> el.classList.remove("show"), 2200);
}

/* ---------- Init ---------- */
buildAbcde();
renderAbcde();
renderGeneral();
tickClock();
setInterval(() => { tickClock(); renderGeneral(); renderAbcde(); }, 1000);

/* ---------- Service worker (PWA) ---------- */
if("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
